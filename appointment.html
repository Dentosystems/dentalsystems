<body>

  <!-- Hero Section -->
  <section class="hero">
    <h2>Book Your Dental Appointment</h2>
    <p>Luxury care for your smile. Fill the form and we'll contact you shortly.</p>
  </section>

  <!-- Appointment Form -->
  <div class="container">
    <form id="appointment-form">
      <label for="name">Full Name*</label>
      <input type="text" id="name" name="name" placeholder="John Doe" required />

      <label for="email">Email*</label>
      <input type="email" id="email" name="email" placeholder="example@mail.com" required />

      <label for="phone">Phone*</label>
      <input type="tel" id="phone" name="phone" placeholder="+254 700 000 000" required />

      <label for="service">Service*</label>
      <select id="service" name="service" required>
        <option value="">Select Service</option>
        <option value="Dental Cleaning">Dental Cleaning</option>
        <option value="Teeth Whitening">Teeth Whitening</option>
        <option value="Dental Implants">Dental Implants</option>
        <option value="Consultation">Consultation</option>
        <option value="other">Other</option>
      </select>

      <div id="other-service-container" style="display:none;">
        <label for="other-service">Please specify your service</label>
        <input type="text" id="other-service" name="other-service" placeholder="Describe your service" />
      </div>

      <label for="date">Preferred Date*</label>
      <input type="date" id="date" name="date" required min="<?php echo date('Y-m-d'); ?>" />

      <label for="time">Preferred Time*</label>
      <input type="time" id="time" name="time" required min="08:00" max="20:00" />

      <label for="message">Additional Message</label>
      <textarea id="message" name="message" placeholder="Any additional details..."></textarea>

      <button type="submit">Book Appointment</button>
    </form>

    <div id="form-status"></div>
  </div>

  <script>
    // Initialize EmailJS
    emailjs.init("YOUR_PUBLIC_KEY"); // replace with your key

    const form = document.getElementById("appointment-form");
    const serviceSelect = document.getElementById("service");
    const otherContainer = document.getElementById("other-service-container");

    serviceSelect.addEventListener("change", () => {
      otherContainer.style.display = serviceSelect.value === "other" ? "block" : "none";
    });

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const serviceText = serviceSelect.value === "other" 
        ? document.getElementById("other-service").value
        : serviceSelect.value;

      const templateParams = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        service: serviceText,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        message: document.getElementById("message").value
      };

      emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", templateParams)
        .then(() => {
          document.getElementById("form-status").innerText = "Appointment booked! We'll contact you soon.";
          form.reset();
          otherContainer.style.display = "none";
        }, (err) => {
          document.getElementById("form-status").innerText = "Error sending booking. Please try again.";
          console.error(err);
        });
    });
  </script>
</body>
