<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment - Dent-o-systems Clinic</title>

<link rel="stylesheet" href="assets/css/style.css">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
  font-family:"Segoe UI",Arial,sans-serif;
  background: linear-gradient(135deg,#0b5ed7,#031633);
  color:var(--text-color);
  margin:0;
}


.hero{
background:#072a5f url('assets/images/home-bg.jpg') no-repeat center/cover;
color:rgb(46, 106, 235);
padding:80px 20px;
text-align:center;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.hero h2{
font-size:36px;
margin-bottom:15px;
text-shadow:0 2px 8px rgba(0,0,0,0.3);
}

.hero p{
font-size:18px;
text-shadow:0 1px 6px rgba(0,0,0,0.3);
}

.container{
max-width:800px;
margin:40px auto;
background:rgba(255,255,255,0.95);
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

form label{
display:block;
margin:15px 0 5px;
font-weight:600;
}

form input,
form select,
form textarea{
width:100%;
padding:12px 15px;
border:1px solid #ccc;
border-radius:12px;
font-size:16px;
transition:all 0.3s ease;
}

form input:focus,
form select:focus,
form textarea:focus{
outline:none;
border-color:#0b5ed7;
box-shadow:0 0 10px rgba(11,94,215,0.3);
}

form textarea{
min-height:100px;
resize:vertical;
}

form button{
margin-top:20px;
background-color:#0b5ed7;
color:white;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:12px;
cursor:pointer;
transition:background-color 0.3s ease, transform 0.2s ease;
}

form button:hover{
background-color:#094bb5;
transform:translateY(-2px);
}

#form-status{
margin-top:20px;
font-weight:bold;
text-align:center;
}

#other-service-container{
margin-top:10px;
}

@media (max-width:600px){

.hero h2{
font-size:28px;
}

.hero p{
font-size:16px;
}

.container{
padding:25px;
}

}
</style>

</head>

<body>

<!-- HEADER -->
<header>

<div class="logo">Dent-o-systems Clinic</div>

<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="gallery.html">Gallery</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="appointment.html">Book Appointment</a></li>
</ul>
</nav>

<button id="theme-toggle">🌙</button>

</header>

<!-- HERO -->

<section class="hero">

<h2>Book Your Dental Appointment</h2>

<p>Luxury care for your smile. Fill the form and we'll contact you shortly.</p>

</section>

<!-- FORM -->

<div class="container">

<form id="appointment-form">

<label>Full Name*</label>
<input type="text" id="name" placeholder="John Doe" required>

<label>Email*</label>
<input type="email" id="email" placeholder="example@mail.com" required>

<label>Phone*</label>
<input type="tel" id="phone" placeholder="+254 700 000 000" required>

<label>Service*</label>

<select id="service" required>

<option value="">Select Service</option>

<option value="Dental Cleaning">Dental Cleaning</option>

<option value="Teeth Whitening">Teeth Whitening</option>

<option value="Dental Implants">Dental Implants</option>

<option value="Consultation">Consultation</option>

<option value="other">Other</option>

</select>

<div id="other-service-container" style="display:none">

<label>Please specify your service</label>

<input type="text" id="other-service" placeholder="Describe your service">

</div>

<label>Preferred Date*</label>

<input type="date" id="date" required>

<label>Preferred Time*</label>

<input type="time" id="time" required min="08:00" max="20:00">

<label>Additional Message</label>

<textarea id="message" placeholder="Any additional details..."></textarea>

<button type="submit">Book Appointment</button>

</form>

<div id="form-status"></div>

</div>

<script>
    <script>

(function(){
emailjs.init("i1Iw_hpp3UMdHPzTe");
})();

const form=document.getElementById("appointment-form")



const form=document.getElementById("appointment-form")

const serviceSelect=document.getElementById("service")

const otherContainer=document.getElementById("other-service-container")

serviceSelect.addEventListener("change",()=>{

otherContainer.style.display=serviceSelect.value==="other"?"block":"none"

})

form.addEventListener("submit",function(e){

e.preventDefault()

const serviceText=serviceSelect.value==="other"

?document.getElementById("other-service").value

:serviceSelect.value

const templateParams={

name:document.getElementById("name").value,

email:document.getElementById("email").value,

phone:document.getElementById("phone").value,

service:serviceText,

date:document.getElementById("date").value,

time:document.getElementById("time").value,

message:document.getElementById("message").value

}

emailjs.send("service_gr3izvo","template_tkfesvs",templateParams)

.then(()=>{

document.getElementById("form-status").innerText="Appointment booked! We'll contact you soon."

form.reset()

otherContainer.style.display="none"

},

(err)=>{

document.getElementById("form-status").innerText="Error sending booking. Please try again."

console.error(err)

})

})

</script>

<script src="assets/js/theme.js"></script>



</body>
</html>

</body>

</html>
